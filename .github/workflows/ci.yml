name: CI Pipeline

on: 
  push:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run linting
      run: pip install flake8 && flake8 --max-line-length=90

    - name: Run tests
      run: |
        pip install pytest
        echo "def test_dummy(): assert 1 == 1" > test_dummy.py
        pytest

    - name: Build Docker Image
      run: docker build -t flask-k8s-app .
